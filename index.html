<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body { font-family: Arial; padding: 15px; background:#f5f5f5; }
      .card { background:white; padding:15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
      label { display:block; margin-top:10px; font-weight:bold; font-size:14px; }
      input, select { width:100%; padding:10px; margin-top:5px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box; }
      button { width:100%; padding:12px; margin-top:15px; background:#28a745; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer; }
      button:hover { background:#218838; }
      h2 { text-align:center; color:#333; margin:0 0 10px 0; }
      .success { color:green; text-align:center; margin-top:10px; }
    </style>
  </head>
  <body>
    <h2>INPUT PRODUKSI</h2>

    <div class="card">
      <label>Jenis Mesin</label>
      <select id="jenis" onchange="showForm()">
        <option value="">--PILIH--</option>
        <option value="GILING">GILING</option>
        <option value="EXTRUDER">EXTRUDER</option>
        <option value="THERMO">THERMO</option>
      </select>
    </div>

    <div id="formArea"></div>

    <script>
      function showForm(){
        let jenis = document.getElementById("jenis").value;
        let html = "";
        
        if(jenis == "GILING" || jenis == "EXTRUDER"){
          html = `
          <div class="card">
            <label>Tanggal</label>
            <input type="date" id="tanggal">
            
            <label>Produk</label>
            <input type="text" id="produk" placeholder="Nama Produk">
            
            <label>Shift</label>
            <select id="shift">
              <option>SHIFT 1</option>
              <option>SHIFT 2</option>
              <option>SHIFT 3</option>
            </select>
            
            <label>Nama Petugas</label>
            <input type="text" id="nama" placeholder="Nama">
            
            <button onclick="save('${jenis}')">SIMPAN</button>
            <div id="msg"></div>
          </div>`;
        }
        
        if(jenis == "THERMO"){
          html = `
          <div class="card">
            <label>Tanggal</label>
            <input type="date" id="tanggal">
            
            <label>Produk</label>
            <input type="text" id="produk" placeholder="Nama Produk">
            
            <label>Shift</label>
            <select id="shift">
              <option>SHIFT 1</option>
              <option>SHIFT 2</option>
              <option>SHIFT 3</option>
            </select>
            
            <label>TF</label>
            <input type="number" id="tf" placeholder="0">
            
            <label>MASUK</label>
            <input type="number" id="masuk" placeholder="0">
            
            <label>BOX</label>
            <input type="number" id="box" placeholder="0">
            
            <label>GRAM</label>
            <input type="number" id="gram" placeholder="0">
            
            <label>WASTE</label>
            <input type="number" id="waste" placeholder="0">
            
            <label>SALDO AKHIR</label>
            <input type="number" id="saldo" placeholder="0">
            
            <label>Nama Petugas</label>
            <input type="text" id="nama" placeholder="Nama">
            
            <button onclick="save('${jenis}')">SIMPAN</button>
            <div id="msg"></div>
          </div>`;
        }
        
        document.getElementById("formArea").innerHTML = html;
        document.getElementById("tanggal").valueAsDate = new Date(); // auto hari ini
      }

      function save(jenis){
        let d = {jenis: jenis};
        d.tanggal = document.getElementById("tanggal").value;
        d["NAMA PRODUK"] = document.getElementById("produk").value;
        d["SHIFT 1,2,3"] = document.getElementById("shift").value;
        d.nama = document.getElementById("nama").value;
        
        if(jenis == "THERMO"){
          d.TF = document.getElementById("tf").value;
          d.MASUK = document.getElementById("masuk").value;
          d.BOX = document.getElementById("box").value;
          d.GRAM = document.getElementById("gram").value;
          d.WASTE = document.getElementById("waste").value;
          d["SALDO AKHIR"] = document.getElementById("saldo").value;
        }
        
        google.script.run.withSuccessHandler(function(msg){
          document.getElementById("msg").innerHTML = "<div class='success'>"+msg+"</div>";
        }).saveData(d);
      }
    </script>
  </body>
</html>
