<!DOCTYPE html>
<html>
<head>
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial;padding:15px;background:#f5f5f5;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
label{display:block;margin-top:10px;font-weight:bold;font-size:14px;}
input,select{width:100%;padding:10px;margin-top:5px;border:1px solid #ccc;border-radius:5px;box-sizing:border-box;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:5px;font-size:15px;cursor:pointer;color:white;}
.btn-green{background:#28a745;}.btn-blue{background:#007bff;}.btn-cyan{background:#17a2b8;}.btn-yellow{background:#ffc107;color:black;}.btn-wa{background:#25D366;}
table{width:100%;font-size:12px;border-collapse:collapse;} td,th{border:1px solid #ddd;padding:5px;text-align:left;}
.success{color:green;text-align:center;margin-top:10px;}
</style>
</head>
<body>
<h2 style="text-align:center;">APP PRODUKSI</h2>

<div class="card">
<label>Jenis Mesin</label>
<select id="jenis" onchange="showForm()">
<option value="">--PILIH--</option>
<option value="GILING">GILING</option>
<option value="EXTRUDER">EXTRUDER</option>
<option value="THERMO">THERMO</option>
</select>
</div>

<div id="formArea"></div>

<div class="card">
<h3>MENU LAIN</h3>
<button class="btn-cyan" onclick="showLaporan()">LIHAT LAPORAN</button>
<button class="btn-yellow" onclick="showData()">LIHAT/EDIT DATA</button>
<button class="btn-wa" onclick="shareHariIni()">SHARE WA HARI INI</button>
</div>

<div id="laporanArea"></div>

<script>
function showForm(){
let jenis = document.getElementById("jenis").value;
let html = "";
if(jenis=="GILING"||jenis=="EXTRUDER"){
html=`<div class="card"><label>Tanggal</label><input type="date" id="tanggal">
<label>Produk</label><div style="display:flex;gap:5px;"><select id="produk" style="flex:1"></select><button type="button" onclick="tambahProduk('${jenis}')" class="btn-blue" style="width:45px;">+</button></div>
<label>Shift</label><select id="shift"><option>SHIFT 1</option><option>SHIFT 2</option><option>SHIFT 3</option></select>
<label>Nama Petugas</label><input type="text" id="nama"><button class="btn-green" onclick="save('${jenis}')">SIMPAN</button><div id="msg"></div></div>`;
}
if(jenis=="THERMO"){
html=`<div class="card"><label>Tanggal</label><input type="date" id="tanggal">
<label>Produk</label><div style="display:flex;gap:5px;"><select id="produk" style="flex:1"></select><button type="button" onclick="tambahProduk('${jenis}')" class="btn-blue" style="width:45px;">+</button></div>
<label>Shift</label><select id="shift"><option>SHIFT 1</option><option>SHIFT 2</option><option>SHIFT 3</option></select>
<label>TF</label><input type="number" id="tf"><label>MASUK</label><input type="number" id="masuk"><label>BOX</label><input type="number" id="box">
<label>GRAM</label><input type="number" id="gram"><label>WASTE</label><input type="number" id="waste"><label>SALDO AKHIR</label><input type="number" id="saldo">
<label>Nama Petugas</label><input type="text" id="nama"><button class="btn-green" onclick="save('${jenis}')">SIMPAN</button><div id="msg"></div></div>`;
}
document.getElementById("formArea").innerHTML=html;
if(jenis!=""){document.getElementById("tanggal").valueAsDate=new Date(); google.script.run.withSuccessHandler(loadProduk).getProdukList(jenis);}
}
function loadProduk(list){let sel=document.getElementById("produk"); sel.innerHTML="<option value=''>--PILIH--</option>"; list.forEach(p=>sel.innerHTML+=`<option>${p}</option>`);}
function tambahProduk(jenis){let n=prompt("Nama Produk Baru untuk "+jenis); if(n)google.script.run.withSuccessHandler(a=>{alert(a);google.script.run.withSuccessHandler(loadProduk).getProdukList(jenis);}).addProduk(jenis,n);}
function save(jenis){
let d={jenis:jenis,tanggal:document.getElementById("tanggal").value,"NAMA PRODUK":document.getElementById("produk").value,"SHIFT 1,2,3":document.getElementById("shift").value,nama:document.getElementById("nama").value};
if(jenis=="THERMO"){d.TF=tf.value;d.MASUK=masuk.value;d.BOX=box.value;d.GRAM=gram.value;d.WASTE=waste.value;d["SALDO AKHIR"]=saldo.value;}
google.script.run.withSuccessHandler(m=>msg.innerHTML=`<div class='success'>${m}</div>`).saveData(d);
}
function shareHariIni(){let tgl=new Date().toISOString().split('T')[0]; google.script.run.withSuccessHandler(l=>window.open(l,'_blank')).shareWA(tgl);}
function showLaporan(){let tgl=prompt("Tanggal YYYY-MM-DD"); google.script.run.withSuccessHandler(data=>{let h=`<div class='card'><h3>LAPORAN ${tgl}</h3>`; data.forEach(d=>h+=`<p><b>${d.produk}</b><br>TF:${d.tf} MASUK:${d.masuk} BOX:${d.box}<br>GRAM:${d.gram} WASTE:${d.waste}</p><hr>`); laporanArea.innerHTML=h+"</div>";}).getLaporan(tgl);}
function showData(){let jenis=document.getElementById("jenis").value; if(!jenis){alert("Pilih jenis dulu");return;} google.script.run.withSuccessHandler(data=>{let h=`<div class='card'><h3>DATA ${jenis}</h3><table><tr>`; data[0].forEach(c=>h+=`<th>${c}</th>`);h+="<th>Aksi</th></tr>"; for(let i=1;i<data.length;i++){h+="<tr>"; data[i].forEach(c=>h+=`<td>${c}</td>`); h+=`<td><button onclick="if(confirm('Hapus?'))google.script.run.withSuccessHandler(()=>showData()).deleteRow('${jenis}',${i+1})" style="background:red;color:white;">Hapus</button></td></tr>`;} laporanArea.innerHTML=h+"</table></div>";}).getDataByJenis(jenis);}
</script>
</body>
</html>
