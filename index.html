<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Input Produksi</title>
  <style>
    body{font-family:Arial;padding:10px;background:#f0f2f5;margin:0}
.card{background:#fff;padding:15px;border-radius:10px;box-shadow:0 2px 8px #0001;margin-bottom:15px}
    input,select,button{width:100%;padding:12px;margin:6px 0;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;font-size:14px}
    button{background:#28a745;color:#fff;border:none;font-weight:bold}
.btn-load{background:#ffc107; color:#000}
.btn-tambah{background:#17a2b8; margin-top:5px}
    h3{text-align:center;margin:0 0 15px 0}
    h4{margin:5px 0 10px 0; color:#007bff; font-size:14px; display:flex; justify-content:space-between}
.produk-box{border:1px solid #eee; padding:10px; border-radius:8px; margin-bottom:10px; background:#fafafa; position:relative}
.btn-del{width:60px; padding:5px; font-size:11px; background:#dc3545; position:absolute; top:5px; right:5px}
  </style>
</head>
<body>
<div class="card">
  <h3>INPUT PRODUKSI</h3>
  <label>Mode</label>
  <select id="mode" onchange="toggleMode()">
    <option value="input">INPUT BARU</option>
    <option value="edit">EDIT DATA</option>
  </select>

  <label>Jenis</label>
  <select id="j" onchange="resetForm()">
    <option>GILING</option><option>EXTRUDER</option><option>THERMO</option>
  </select>
  <label>Tanggal</label>
  <input type="date" id="t">
  <label>Nama Petugas</label>
  <input type="text" id="nama" placeholder="Isi Nama Anda">

  <button class="btn-load" onclick="loadDataEdit()" id="btnLoad" style="display:none">LOAD DATA TANGGAL INI</button>

  <div id="form"></div>
  <button class="btn-tambah" onclick="tambahProduk()">+ TAMBAH PRODUK</button>
  <button id="btnSimpan" onclick="simpan()">SIMPAN & SHARE WA</button>
</div>

<script>
const API = "PASTE_URL_WEB_APP_KAMU_DISINI";
let jumlahProduk = 1;
let listMasterProduk = [];
document.getElementById('t').value = new Date().toISOString().split('T')[0];
loadMaster();

async function call(fn,data){
  let res = await fetch(API,{method:"POST",body:JSON.stringify({fn,data})});
  return res.json();
}

async function loadMaster(){
  listMasterProduk = await call("getMasterProduk");
  renderForm();
}

function toggleMode(){
  let mode = document.getElementById("mode").value;
  document.getElementById("btnLoad").style.display = mode=="edit"? "block" : "none";
  resetForm();
}

function resetForm(){
  jumlahProduk = 1;
  renderForm();
}

function tambahProduk(){
  if(jumlahProduk < 20){ jumlahProduk++; renderForm(); }
  else{ alert("Max 20 Produk"); }
}

function renderForm(data=[]){
  let j=document.getElementById("j").value; let h=""; let mode = document.getElementById("mode").value;
  const listTF = ["TF4","TF5","TF6","TF7","TF8","TF9","TF10","TF11","TF12","TF13","TF14","TF15","TF16","TF11L","TF11P"];

  h+=`<label>SHIFT</label><select id="SHIFT"><option>SHIFT 1</option><option>SHIFT 2</option><option>SHIFT 3</option></select>`;

  for(let i=1;i<=jumlahProduk;i++){
    let d = data[i-1] || {};
    let produkOptions = `<option value="">Pilih Produk</option>`;
    listMasterProduk.forEach(x=> produkOptions += `<option value="${x[0]}" ${d["NAMA PRODUK"]==x[0]?'selected':''}>${x[0]}</option>`);

    if(j=="GILING" || j=="EXTRUDER"){
      h+=`<div class="produk-box" id="box${i}">
        <h4>PRODUK ${i} ${mode=="edit" && d.row? `<button class="btn-del" onclick="hapus(${d.row},'${j}',${i})">HAPUS</button>` : `<button class="btn-del" onclick="hapusForm(${i})">X</button>`}</h4>
        <input type="hidden" id="ROW${i}" value="${d.row || ''}">
        <label>NAMA PRODUK</label><select id="P${i}">${produkOptions}</select>
        <label>JUMLAH</label><input type="number" id="JML${i}" value="${d.JUMLAH || ''}">
      </div>`;
    }

    if(j=="THERMO"){
      let tfOptions = `<option value="">Pilih TF</option>`;
      listTF.forEach(tf => tfOptions += `<option value="${tf}" ${d.TF==tf?'selected':''}>${tf}</option>`);
      h+=`<div class="produk-box" id="box${i}">
        <h4>PRODUK ${i} ${mode=="edit" && d.row? `<button class="btn-del" onclick="hapus(${d.row},'${j}',${i})">HAPUS</button>` : `<button class="btn-del" onclick="hapusForm(${i})">X</button>`}</h4>
        <input type="hidden" id="ROW${i}" value="${d.row || ''}">
        <label>NAMA PRODUK</label><select id="P${i}">${produkOptions}</select>
        <label>TF</label><select id="TF${i}">${tfOptions}</select>
        <label>MASUK</label><input type="number" id="MASUK${i}" value="${d.MASUK || ''}">
        <label>BOX</label><input type="number" id="BOX${i}" value="${d.BOX || ''}">
        <label>GRAM</label><input type="number" id="GRAM${i}" value="${d.GRAM || ''}">
        <label>WASTE</label><input type="number" id="WASTE${i}" value="${d.WASTE || ''}">
        <label>SALDO AKHIR</label><input type="number" id="SALDO${i}" value="${d['SALDO AKHIR'] || ''}">
      </div>`;
    }
  }
  document.getElementById("form").innerHTML=h;
  if(data[0]) document.getElementById("SHIFT").value = data[0]["SHIFT 1,2,3"];
}

function hapusForm(i){
  document.getElementById(`box${i}`).style.display = "none";
}

async function loadDataEdit(){
  let jenis = document.getElementById("j").value;
  let tanggal = document.getElementById("t").value;
  let data = await call("getDataByDate",{jenis,tanggal});
  jumlahProduk = data.length > 0? data.length : 1;
  renderForm(data);
  alert(data.length + " Data Ditemukan");
}

async function simpan(){
  let nama = document.getElementById("nama").value;
  if(!nama){alert("Isi Nama Petugas dulu"); return;}

  let jenis = document.getElementById("j").value;
  let tanggal = document.getElementById("t").value;
  let shift = document.getElementById("SHIFT").value;
  let mode = document.getElementById("mode").value;
  let semuaData = [];

  let header = jenis=="GILING"||jenis=="EXTRUDER"
? `| NO | PRODUK | JUMLAH |\n|----|---------------|--------|`
  : `| NO | TF | PRODUK | MASUK | BOX | GRAM | WASTE | SALDO |\n|----|--------|--------------|-------|-----|------|-------|-------|`;

  let isiTabel = ""; let no = 1;

  for(let i=1;i<=jumlahProduk;i++){
    let box = document.getElementById(`box${i}`);
    if(!box || box.style.display=="none") continue;

    let produk = document.getElementById(`P${i}`).value;
    let row = document.getElementById(`ROW${i}`).value;
    if(!produk) continue;

    if(jenis=="GILING" || jenis=="EXTRUDER"){
      let jml = document.getElementById(`JML${i}`).value;
      if(jml){
        let d = {jenis,tanggal,row,nama,"SHIFT 1,2,3":shift,"NAMA PRODUK":produk,JUMLAH:jml}
        mode=="edit"? await call("updateData",d) : await call("saveData",d);
        semuaData.push(d);
        isiTabel += `| ${no} | ${produk.padEnd(13)} | ${jml.padStart(6)} |\n`;
        no++;
      }
    }

    if(jenis=="THERMO"){
      let tf = document.getElementById(`TF${i}`).value;
      if(tf){
        let mas = document.getElementById(`MASUK${i}`).value || "0";
        let box = document.getElementById(`BOX${i}`).value || "0";
        let gram = document.getElementById(`GRAM${i}`).value || "0";
        let was = document.getElementById(`WASTE${i}`).value || "0";
        let sal = document.getElementById(`SALDO${i}`).value || "0";
        let d = {jenis,tanggal,row,nama,"NAMA PRODUK":produk,"SHIFT 1,2,3":shift,TF:tf, MASUK:mas, BOX:box, GRAM:gram, WASTE:was, "SALDO AKHIR":sal}
        mode=="edit"? await call("updateData",d) : await call("saveData",d);
        semuaData.push(d);
        isiTabel += `| ${no} | ${tf.padEnd(6)} | ${produk.substring(0,12).padEnd(12)} | ${mas.padStart(5)} | ${box.padStart(3)} | ${gram.padStart(6)} | ${was.padStart(5)} | ${sal.padStart(5)} |\n`;
        no++;
      }
    }
  }

  alert(semuaData.length + " Data Diproses");
  if(semuaData.length > 0 && confirm("Kirim ke WA?")){
    let pesan = `*${jenis} - ${mode=="edit"?"UPDATE":"BARU"}*\nTgl: ${tanggal}\nShift: ${shift}\nPetugas: ${nama}\n\n\`\n${header}\n${isiTabel}\`\``;
    window.open("https://wa.me/?text="+encodeURIComponent(pesan));
  }
}

async function hapus(row, jenis, i){
  if(confirm("Yakin hapus dari database?")){
    await call("deleteData",{jenis,row});
    alert("Data Dihapus");
    hapusForm(i);
  }
}
</script>
</body>
</html>
